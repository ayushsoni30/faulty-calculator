<!DOCTYPE html>
<html>
<head>
  <title>chutiya Calculator</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <div class="calculator">
    <h2>chutiya Calculator</h2>

    <input type="number" id="num1" placeholder="Enter Your 1st Number">
    <select  id="operator" >
      <option value="+">+</option>
      <option value="-">-</option>
      <option value="*">*</option>
      <option value="/">/</option>
      <option value="**">** (Power)</option>
    </select>
    <input type="number" id="num2" placeholder="Enter Your 2nd Number">

    

    <button id="but" onclick="calculate()">Calculate</button>

    <div class="result" id="result">Result: --</div>
  </div>

<script src="index.js"></script>
</body>
</html>
